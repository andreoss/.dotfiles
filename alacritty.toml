[font]
size = 36.0

[font.normal]
family = "Terminus"

[font.bold]
family = "Terminus"

[font.italic]
family = "Terminus"

[font.bold_italic]
family = "Terminus"

[window]
opacity = 0.9
padding.x = 16
padding.y = 16

[mouse]
hide_when_typing = false

[colors.primary]
background = "#000000"
foreground = "#FFFFEA"

[colors.cursor]
text = "#000000"
cursor = "#ffffff"

[colors.selection]
text = "CellForeground"
background = "#583838"

[colors.normal]
black   = '#000000'
red     = '#AE2808'
green   = '#00A800'
yellow  = '#A85400'
blue    = '#0000A8'
magenta = '#A800A8'
cyan    = '#00A8A8'
white   = '#A8A8A8'

[colors.bright]
black   = '#545454'
red     = '#FC5454'
green   = '#54FC54'
yellow  = '#FCFC54'
blue    = '#5454FC'
magenta = '#FC54FC'
cyan    = '#54FCFC'
white   = '#FFFFEA'

[keyboard]
bindings = [
  { key = "F11", action = "ToggleFullscreen" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "N", mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "+", mods = "Control|Shift", action = "IncreaseFontSize" },
  { key = "-", mods = "Control|Shift", action = "DecreaseFontSize" }
]


[env]
TERM = "xterm-256color"
